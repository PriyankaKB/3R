---
# ==============================================================================
# 5. ORCHESTRATOR AGENT (Port 8084)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-orchestrator-deployment
  labels:
    app: adk-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-orchestrator
  template:
    metadata:
      labels:
        app: adk-orchestrator
    spec:
      containers:
      - name: orchestrator
        image: us-central1-docker.pkg.dev/your-gcp-project-id/my-docker-repo/adk-orchestrator:latest
        ports:
        - containerPort: 8084
        env:
        - name: SEGREGATION_AGENT_URL
          value: "http://adk-segregation-service:8080/process"
---
apiVersion: v1
kind: Service
metadata:
  name: adk-orchestrator-service
spec:
  type: ClusterIP  # Kept private inside the GKE network
  selector:
    app: adk-orchestrator
  ports:
  - protocol: TCP
    port: 8084
    targetPort: 8084

---
# ==============================================================================
# 6. FRONTEND AGENT (Port 3000)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-frontend-deployment
  labels:
    app: adk-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-frontend
  template:
    metadata:
      labels:
        app: adk-frontend
    spec:
      containers:
      - name: frontend
        image: us-central1-docker.pkg.dev/your-gcp-project-id/my-docker-repo/adk-frontend:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: adk-frontend-service
spec:
  type: LoadBalancer  # Public UI Gateway Endpoint
  selector:
    app: adk-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000