  name: review-dispatch-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-dispatch-agent
  template:
    metadata:
      labels:
        app: review-dispatch-agent
    spec:
      serviceAccountName: project-3r-ksa
      containers:
      - name: agent
        image: us-central1-docker.pkg.dev/your-gcp-project-id/my-docker-repo/review-dispatch-agent:latest
        ports:
