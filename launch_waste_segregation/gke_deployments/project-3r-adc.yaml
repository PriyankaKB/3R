# ==============================================================================
# KUBERNETES SERVICE ACCOUNT (WORKLOAD IDENTITY / ADC LINK)
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: project-3r-ksa
  namespace: default
  annotations:
    # This annotation maps your pod directly to the secure GCP IAM Service account
    iam.gke.io/gcp-service-account: "project-3r-gke-sa@your-gcp-project-id.iam.gserviceaccount.com"
---
# ==============================================================================
# CONFIGMAP (Environment Targets Only)
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: project-3r-config
data:
  GCP_PROJECT_ID: "your-gcp-project-id"
  GCS_WASTE_BUCKET: "your-3r-waste-bucket"
  BQ_DATASET: "waste_segregation_3r"
  BQ_TELEMETRY_TABLE: "gke_segregation_telemetry"
  SEGREGATION_AGENT_URL: "http://adk-segregation-service:8080/process"
  ROBOTIC_ARM_AGENT_URL: "http://adk-robotic-service:8081/process"
  HMI_AGENT_URL: "http://adk-hmi-service:8082/process"
  DISPATCH_AGENT_URL: "http://adk-dispatch-service:8083/process"

---
# ==============================================================================
# 1. SEGREGATION AGENT (Port 8080 - GPU Node / Native ADC Engine)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: segregation-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: segregation-agent
  template:
    metadata:
      labels:
        app: segregation-agent
    spec:
      serviceAccountName: project-3r-ksa # Instructs pod to assume Workload Identity metadata
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-node-pool # Explicitly pin heavy RAPIDS layers to GPU node pool
      containers:
      - name: agent
        image: us-central1-docker.pkg.dev/your-gcp-project-id/my-docker-repo/segregation-agent:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: project-3r-config
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: segregation-service
spec:
  type: ClusterIP
  selector:
    app: segregation-agent
  ports:
  - port: 8080
    targetPort: 8080

---
# ==============================================================================
# 2. ROBOTIC ARM AGENT (Port 8081)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotic-arm-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robotic-arm-agent
  template:
    metadata:
      labels:
        app: robotic-arm-agent
    spec:
      serviceAccountName: project-3r-ksa
      containers:
      - name: agent
        image: us-central1-docker.pkg.dev/your-gcp-project-id/my-docker-repo/robotic-arm-agent:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: project-3r-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: robotic-arm-service
spec:
  type: ClusterIP
  selector:
    app: robotic-arm-agent
  ports:
  - port: 8081
    targetPort: 8081

---
